# docker-compose.dev.yml — override for local development
# Usage: docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.dev.yml up
#
# This file restores development-friendly behavior:
# - Backend runs as Development (Swagger on, HTTPS off, dev logging)
# - Translator Basic Auth disabled (open admin UI for local dev)
# - Rate limiting disabled (no 429 during dev)
# - ForwardedHeaders disabled (no reverse proxy in local dev)

services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Swagger__Enabled=true
      - ForwardedHeaders__Enabled=false
      - RateLimiting__Enabled=false
      - AllowedHosts=*

  translator-web:
    environment:
      - NODE_ENV=development
      - BASIC_AUTH_ENABLED=false
      - LOG_LEVEL=debug

  translator-worker:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
